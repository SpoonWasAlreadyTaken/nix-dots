# C-a :source-file ~/.config/tmux/tmux.conf 
# settings

set -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

set -g base-index 1
set -g renumber-windows on

setw -g mode-keys vi

set -g display-time 2000
set -g history-limit 50000

set -g default-terminal "${TERM}"
set -sg terminal-overrides ",*:RGB"
set -g allow-passthrough on
set -sg escape-time 0

set -g mouse on
set -g focus-events on

set -g popup-border-lines rounded



# ghostty specific
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-features ",xterm-ghostty:extkeys"
set -as terminal-features ",xterm-ghostty:focus"



# keybindings


bind C-x display-popup -d "#{pane_current_path}" -w 80% -h 80% -E $SHELL





# satus bar customization

# SLOPE_OPEN="#(printf '\ue0ba')"
# SLOPE_CLOSE="#(printf '\ue0bc')"

FG="#f38ba8"
BG="#040405"

G1="#3e252d"
G2="#804a5a"
G3="#c8738b"

WHITE="#ffffff"
BLACK="#000000"

set -g status-left-length 80

set -g status-style bg=${BG},fg=${FG}
set -g status-left " #[bg=${G1},fg=${WHITE}] #[bg=${G2},fg=${WHITE}] #[bg=${G3},fg=${WHITE}] #[bg=${FG},fg=${BG},bold] #{session_name}#[bg=${G3},fg=${FG}]\ue0bc#[bg=${G2},fg=${G3}]\ue0bc#[bg=${G1},fg=${G2}]\ue0bc#[bg=${BG},fg=${G1}]\ue0bc"

set -g status-right "#[bg=${G1},fg=${BG}]\ue0bc#[bg=${G2},fg=${G1}]\ue0bc#[bg=${G3},fg=${G2}]\ue0bc#[bg=${FG},fg=${G3}]\ue0bc#[bg=${FG},fg=${BG},bold]#{host} #[bg=${G3},fg=${WHITE}] #[bg=${G2},fg=${WHITE}] #[bg=${G1},fg=${WHITE}] #[bg=${BG},fg=${BG}] "

set -g status-justify absolute-centre
set -g window-status-format "  #[bg=${BG}, fg=${WHITE}]#{=|10|..;p10:#{window_name}} "
set -g window-status-current-format "| #[bg=${BG}, fg=${WHITE}]#{=|10|..;p10:#{window_name}} "
set -g window-status-current-style "bold"


# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'

run '~/.tmux/plugins/tpm/tpm'

